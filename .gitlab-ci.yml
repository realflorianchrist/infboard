#--------------------$
# Deploy Docker images (dev)
#--------------------$
deploy-docker-job-dev:
  stage: deploy
  image: docker:latest
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "ssh://$DEPLOYMENT_USER@$DEPLOYMENT_HOST"
    # ------------------------------------------------------------------------------------------------------------------
    # NB: environment variables must be overridden in the docker compose file.
    # ------------------------------------------------------------------------------------------------------------------
  before_script:
    - apk update
    # install ssh client and add the deployment key
    - apk add openssh-client
    - eval $(ssh-agent -s)
    # Masking CI/CD variables in Gitlab does not work for SSH private keys, as they
    # include whitespaces and line breaks. We replaced whitespaces with '_' and line breaks
    # with '__', so that Gitlab accepts the value, and now we need to fix the key again.
    - modified_key=$(echo "$DEPLOYMENT_KEY" | sed 's/__/\n/g' | tr '_' ' ')
    - echo "$modified_key" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "HOST *" > ~/.ssh/config
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
    # create Docker auth config
    - mkdir -p ~/.docker
    - echo $DOCKER_AUTH_CONFIG > ~/.docker/config.json
  script:
    - echo "running deploy job to $DOCKER_HOST"
    - docker login $CI_REGISTRY
    - export COMPOSE_FILE=docker-compose.staging.yml
    - docker compose pull
    - docker compose up -d
    - docker image prune -a -f
  only:
    - dev
