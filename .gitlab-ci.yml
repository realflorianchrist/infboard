#--------------------$
# Deploy Docker images (dev)
#--------------------$
deploy-dev:
  stage: deploy
  image: docker:latest
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "ssh://$DEPLOYMENT_USER@$DEPLOYMENT_HOST"
    # ------------------------------------------------------------------------------------------------------------------
    # NB: environment variables must be overridden in the docker compose file.
    # ------------------------------------------------------------------------------------------------------------------
  before_script:
    - apk update && apk add openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KEY_DEV" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - eval "$(ssh-agent -s)"
    - ssh-add ~/.ssh/id_ed25519
    - echo "Host *" > ~/.ssh/config
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
    # create Docker auth config
    - mkdir -p ~/.docker
    - echo $DOCKER_AUTH_CONFIG > ~/.docker/config.json
  script:
    - echo "running deploy job to $DOCKER_HOST"
    - docker login $CI_REGISTRY
    - export COMPOSE_PROJECT_NAME=infboard
    - export COMPOSE_FILE=docker-compose.dev.yml
    - docker compose pull
    - docker compose up -d --remove-orphans
    - docker image prune -a -f
#  dependencies:
#    - build-backend
#    - build-frontend
  only:
    - dev
