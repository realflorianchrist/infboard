services:
  backend:
    container_name: backend
    image: registry.gitlab.com/realflorianchrist/infboard/backend-dev:latest
    restart: always
    ports:
      - "8080"
    env_file:
      - backend/.env
    depends_on:
      - mongo
      - minio

  frontend:
    container_name: frontend
    image: registry.gitlab.com/realflorianchrist/infboard/frontend-dev:latest
    restart: always
    ports:
      - "3000:3000"

  minio:
    image: quay.io/minio/minio
    restart: always
    ports:
      - "9000"  # S3 API
      - "127.0.0.1:9001:9001"  # Web UI
    command: server /data --console-address ":9001"
    env_file:
      - backend/s3/.env
    volumes:
      - minio-data:/data

  mongo:
    image: mongo
    container_name: mongo
    hostname: mongo
    restart: always
    ports:
      - "27017"
    env_file:
      - backend/db/.env
    command: [ "--replSet", "rs0", "--keyFile", "/etc/mongo-keyfile", "--bind_ip_all" ]
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./init-replica.js:/scripts/init-replica.js:ro
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --port 27017 -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin /scripts/init-replica.js --quiet" ]
      interval: 5s
      timeout: 30s
      retries: 30

  mongo-express:
    image: mongo-express
    container_name: mongo_express
    restart: always
    ports:
      - "127.0.0.1:8081:8081"
    env_file:
      - backend/db/.env
    depends_on:
      - mongo

  webserver:
    image: nginx:alpine
    container_name: router
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/infboard/frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/infboard/certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

volumes:
  minio-data:
  mongo_data:
  mongo_config: