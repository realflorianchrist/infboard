http {
    server {
        listen 80;
        server_name infboardv2.ch www.infboardv2.ch;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://frontend:3000;
        }
    }
}

